apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aiops-hub.fullname" . }}
  labels:
    {{- include "aiops-hub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aiops-hub.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aiops-hub.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: aiops-hub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "aiops-hub.fullname" . }}
            - secretRef:
                name: {{ include "aiops-hub.fullname" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: aiops-state
              mountPath: /app/data
      volumes:
        - name: aiops-state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "aiops-hub.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
